theme:
  name: material
  custom_dir: overrides
  static_templates:
    - 404.html
  palette:
    primary: 'custom'
    accent: 'amber'
  logo: img/mascot/neutral.png
  favicon: img/mascot/favicon.ico
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

# Image prompt files and other non-publishable markdown should be listed here
exclude_docs: |
  sims/digital-devices-explorer/image-prompt.md
  img/mascot/image-prompts.md
  learning-graph/index-template.md

plugins:
  - search
  - glightbox
  - social
  - social_override

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - js/config.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - docs
  - mkdocs.yml

