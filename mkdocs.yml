extra:
  generator: false
  analytics:
    provider: google
    property: G-P0GG74Y40S
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Digital Citizenship
  textbook_version: "1.0"
  status:
    spec-complete: "Specification complete"
    prototype: "Initial prototype complete"
    ready-for-testing: "Ready for testing"
